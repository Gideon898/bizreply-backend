<!DOCTYPE html>
<html>
<head>
  <title>BizReply AI</title>
  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:500px;
      background:#1e293b;
      padding:20px;
      border-radius:10px;
    }

    textarea{
      width:100%;
      height:120px;
      padding:10px;
      margin-bottom:10px;
    }

    button{
      width:100%;
      padding:10px;
      background:green;
      color:white;
      border:none;
      cursor:pointer;
    }

    #reply{
      margin-top:15px;
      background:#334155;
      padding:10px;
      min-height:80px;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>BizReply AI</h2>

  <textarea id="message" placeholder="Type message..."></textarea>

  <button onclick="sendMessage()">Generate Reply</button>

  <div id="reply">AI reply will appear here...</div>

</div>

<script>
async function sendMessage(){

  const message = document.getElementById("message").value;
  const replyBox = document.getElementById("reply");

  replyBox.innerHTML = "Thinking...";

  try {
    const response = await fetch("https://bizreply-backend-xu2i.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    replyBox.innerHTML = data.reply;

  } catch (error) {
    replyBox.innerHTML = "Error connecting to AI backend";
  }
}
</script>

</body>
</html>
